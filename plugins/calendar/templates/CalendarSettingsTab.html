<div class="frickmail-calendar">
	<div class="frickmail-calendar-toolbar">
		<button class="btn" data-bind="click: prevMonth">&laquo;</button>
		<button class="btn" data-bind="click: today">Today</button>
		<button class="btn" data-bind="click: nextMonth">&raquo;</button>
		<span class="frickmail-cal-title" data-bind="text: title"></span>
		<span style="flex:1"></span>
		<button class="btn" data-bind="click: fetch">
			<i data-bind="css: { 'icon-spinner animated': loading(), 'icon-reload': !loading() }"></i>
			Refresh
		</button>
	</div>
	<div class="frickmail-calendar-grid"></div>
	<div class="frickmail-calendar-status" data-bind="text: status"></div>
	<p style="margin-top:1em;color:#888;font-size:90%">Click a day to add an event. Click an event to edit or delete it. Events are read from your linked Google Calendar (primary) or Outlook /me/events.</p>
</div>

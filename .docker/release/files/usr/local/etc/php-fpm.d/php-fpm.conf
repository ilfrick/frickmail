[global]
daemonize = no
error_log = /dev/stderr
log_buffering = no

[default]
listen = 9000
user = www-data
listen.owner = www-data
listen.group = www-data
pm = ondemand
pm.max_children = 30
pm.process_idle_timeout = 10s
pm.max_requests = 500
catch_workers_output = yes
decorate_workers_output = no
chdir = /
pm.status_path = /status
; Frickmail: forward OAuth2 env-vars from Docker into PHP-FPM workers
clear_env = no
env[FRICKMAIL_GMAIL_CLIENT_ID] = $FRICKMAIL_GMAIL_CLIENT_ID
env[FRICKMAIL_GMAIL_CLIENT_SECRET] = $FRICKMAIL_GMAIL_CLIENT_SECRET
env[FRICKMAIL_O365_CLIENT_ID] = $FRICKMAIL_O365_CLIENT_ID
env[FRICKMAIL_O365_CLIENT_SECRET] = $FRICKMAIL_O365_CLIENT_SECRET
env[FRICKMAIL_O365_TENANT] = $FRICKMAIL_O365_TENANT
env[FRICKMAIL_DB_HOST] = $FRICKMAIL_DB_HOST
env[FRICKMAIL_DB_PORT] = $FRICKMAIL_DB_PORT
env[FRICKMAIL_DB_NAME] = $FRICKMAIL_DB_NAME
env[FRICKMAIL_DB_USER] = $FRICKMAIL_DB_USER
env[FRICKMAIL_DB_PASSWORD] = $FRICKMAIL_DB_PASSWORD
env[FRICKMAIL_OPEN_SIGNUP] = $FRICKMAIL_OPEN_SIGNUP
php_admin_value[log_errors] = On
php_admin_value[expose_php] = Off
php_admin_value[display_errors] = Off
php_admin_value[date.timezone] = UTC
php_admin_value[post_max_size] = <UPLOAD_MAX_SIZE>
php_admin_value[upload_max_filesize] = <UPLOAD_MAX_SIZE>
php_admin_value[memory_limit] = <MEMORY_LIMIT>
